<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/form.css">
    <title>Document</title>
</head>
<body>
    <div class="form-background">
        <div class="form-white">
            <form action="">
                <div class="w-100">
                    <h3>Contact Us</h3>
                    <p>Your Email</p>
                    <input type="email" class="form-input" placeholder="email@example.com">
                </div>
                
                <div class="w-50">
                    <p>First name</p>
                    <input type="text" class="form-input">
                </div>
                <div class="w-50">
                    <p>Last name</p>
                    <input type="text" class="form-input">
                </div>
                <div style="clear: both;"></div>

                <div class="w-100" style="position: relative; top: -5px;">
                    <p>Message</p>
                    <textarea class="form-input form-long"></textarea>
                </div>

                <div>
                    <input id="sub" type="checkbox">
                    <label for="sub">Subscribe</label>
                    <button class="yellow-button">SEND</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
